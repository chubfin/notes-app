steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '-t'
      - 'gcr.io/$PROJECT_ID/notes-backend'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - 'gcr.io/$PROJECT_ID/notes-backend'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - notes-backend
      - '--image'
      - 'gcr.io/$PROJECT_ID/notes-backend'
      - '--region'
      - us-central1
      - '--platform'
      - managed
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/notes-backend'